<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un mes más contigo 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 20px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      animation: aparecer 0.6s ease;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: white;
      color: #ff4d6d;
    }

    .foto {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      animation: aparecer 0.8s ease;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card" id="card">
  <h1>Hola mi amorcito UwU ❤️</h1>
  <p>
    Hoy cumplimos un mes más juntos 💖<br>
    Y solo quiero decirle algo muy importante...
  </p>
  <button onclick="mostrarSorpresa()">Siguiente ✨</button>
</div>

<script>
  function mostrarSorpresa() {
    lanzarFuegos();
    navigator.vibrate?.(200);

    const card = document.getElementById("card");
    card.innerHTML = `
      <h1>💞 Feliz mes mi amorcito 💞</h1>
      <p>
        Gracias por estar conmigo, por su amor y por cada momento juntos ❤️<br>
        La amo muchísimo mi bebecita hermosa UwU 💖
      </p>

      <img src="https://xt2447.github.io/Sorpresa/Nosotros.jpg" class="foto">

      <p style="margin-top: 15px; font-size: 0.95rem;">
        Por muchos meses más a su lado 💕
      </p>
    `;
  }

  /* FUEGOS ARTIFICIALES */
  const canvas = document.getElementById("fireworks");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  resize();
  window.onresize = resize;

  function lanzarFuegos() {
    for (let i = 0; i < 80; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height / 2;

      for (let j = 0; j < 20; j++) {
        ctx.beginPath();
        ctx.arc(
          x + Math.random() * 80 - 40,
          y + Math.random() * 80 - 40,
          2,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = `hsl(${Math.random() * 360},100%,70%)`;
        ctx.fill();
      }
    }
  }
</script>

</body>
</html>
