<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un mes más 💖</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #fff;
    overflow: hidden;
  }

  .pantalla {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 30px;
    transition: opacity 0.8s ease;
  }

  .oculta {
    opacity: 0;
    pointer-events: none;
  }

  h1 {
    font-weight: 500;
    font-size: 2rem;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.1rem;
    line-height: 1.6;
    max-width: 400px;
  }

  .boton {
    margin-top: 30px;
    padding: 10px 18px;
    border: 1px solid #fff;
    border-radius: 20px;
    background: transparent;
    color: white;
    cursor: pointer;
  }

  /* ✨ segunda pantalla estilo carta */
  .carta {
    max-width: 380px;
    animation: aparecer 1s ease;
  }

  .foto {
    width: 100%;
    border-radius: 12px;
    margin-top: 20px;
  }

  @keyframes aparecer {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ✨ partículas suaves */
  .estrella {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.5;
    animation: flotar 10s linear infinite;
  }

  @keyframes flotar {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
  }

</style>
</head>

<body>

<!-- 🌌 fondo animado -->
<div id="fondo"></div>

<!-- PANTALLA 1 -->
<div class="pantalla" id="pantalla1">
  <div>
    <h1>Hey… ❤️</h1>
    <p>
      Hoy no es cualquier día ✨<br><br>
      Es otro mes más contigo…  
      y eso ya lo hace especial 💖
    </p>
    <button class="boton" onclick="cambiar()">tocar ✨</button>
  </div>
</div>

<!-- PANTALLA 2 -->
<div class="pantalla oculta" id="pantalla2">
  <div class="carta">
    <h1>💞 Un mes más 💞</h1>
    <p>
      Gracias por cada momento, cada risa  
      y por estar conmigo ❤️<br><br>
      No necesito mucho más…  
      solo seguir compartiendo tiempo contigo ✨
    </p>

    <img src="https://xt2447.github.io/Sorpresa/Nosotros.jpg" class="foto">

    <p style="margin-top:15px; font-size:0.9rem;">
      💖 me haces muy feliz 💖
    </p>
  </div>
</div>

<script>
  function cambiar() {
    document.getElementById("pantalla1").classList.add("oculta");
    document.getElementById("pantalla2").classList.remove("oculta");
  }

  /* 🌌 generar estrellitas */
  const fondo = document.getElementById("fondo");

  for (let i = 0; i < 60; i++) {
    const estrella = document.createElement("div");
    estrella.className = "estrella";
    estrella.style.left = Math.random() * 100 + "vw";
    estrella.style.animationDuration = (5 + Math.random() * 10) + "s";
    estrella.style.opacity = Math.random();
    fondo.appendChild(estrella);
  }
</script>

</body>
</html>
